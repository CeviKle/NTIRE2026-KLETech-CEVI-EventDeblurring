name: ERestormer_100k_test
model_type: ImageEventRestorationModel
scale: 1
num_gpu: 1
manual_seed: 10

datasets:
  test:
    name: HighREV_val
    type: NpzPngSingleDeblurDataset
    dataroot: /NTIRE2026/C20_EventDeblur/HighREV/val

    io_backend:
      type: disk

    phase: test
    gt_size: 0
    use_hflip: false
    use_rot: false
    use_shuffle: false
    num_worker_per_gpu: 0
    batch_size_per_gpu: 1
    scale: 1

network_g:
  type: ERestormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  bias: false
  LayerNorm_type: WithBias

path:
  pretrain_network_g: ./experiments/ERestormer_highrev_single_deblur_v2/models/net_g_100000.pth
  strict_load_g: true
  root: ./
  results_root: ./results/ERestormer_100k
  log: ./results/ERestormer_100k
  visualization: ./results/ERestormer_100k/visualization

train: {}

val:
  save_img: true
  suffix: ''
  metrics: null

logger:
  print_freq: 100
  use_tb_logger: false

dist_params:
  backend: nccl
  port: 29500