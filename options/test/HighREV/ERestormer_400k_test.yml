name: ERestormer_400k_testdata_test
model_type: ImageEventErestormerModel
scale: 1
num_gpu: 1
manual_seed: 10
datasets:
  test:
    name: HighREV_test
    type: NpzPngSingleDeblurDataset
    dataroot: /NTIRE2026/C20_EventDeblur/test_data/HighREV_test/HighREV_test
    io_backend:
      type: disk
    phase: test
    gt_size: 0
    use_hflip: false
    use_rot: false
    use_shuffle: false
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    scale: 1
network_g:
  type: ERestormer
  inp_channels: 6
  out_channels: 3
  dim: 64
  num_blocks: 8
path:
  pretrain_network_g: ./experiments/ERestormer_highrev_single_deblur_v2/models/net_g_400000.pth
  strict_load_g: true
  root: ./
  results_root: ./results/ERestormer_400k_testdata
  log: ./results/ERestormer_400k_testdata
  visualization: ./results/ERestormer_400k_testdata/visualization
val:
  save_img: true
  tile: 128
  tile_overlap: 32
logger:
  print_freq: 100
  use_tb_logger: false
dist_params:
  backend: nccl
  port: 29500
